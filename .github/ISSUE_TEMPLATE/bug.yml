name: 🐛 Bug Report
description: Report a bug in Agent Shadow Brain
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out as much as you can.

  - type: input
    id: version
    attributes:
      label: Shadow Brain version
      description: Output of `shadow-brain --version`
      placeholder: 5.2.0
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: AI agent affected
      description: Which AI coding agent are you using when this happens?
      options:
        - Claude Code
        - Cursor
        - Cline
        - Windsurf
        - Codex
        - Kilo Code
        - Roo Code
        - OpenCode
        - Aider
        - GitHub Copilot
        - Other / Not agent-specific
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - WSL
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so anyone can repeat what you did
      placeholder: |
        1. Run `shadow-brain attach-all`
        2. Open Claude Code
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Output of `shadow-brain doctor` or any relevant logs
      render: shell
