<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="10"/>

  <!-- Watchers -->
  <rect x="30" y="40" width="150" height="60" rx="8" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <text x="105" y="65" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">FILE WATCHER</text>
  <text x="105" y="82" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9">chokidar • fs</text>

  <rect x="30" y="120" width="150" height="60" rx="8" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <text x="105" y="145" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" font-weight="bold">GIT WATCHER</text>
  <text x="105" y="162" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9">simple-git</text>

  <!-- Arrow to Analyzer -->
  <line x1="180" y1="100" x2="260" y2="175" stroke="url(#flow)" stroke-width="2" opacity="0.6" stroke-dasharray="5,3" filter="url(#soft)"/>
  <line x1="180" y1="155" x2="260" y2="195" stroke="url(#flow)" stroke-width="2" opacity="0.6" stroke-dasharray="5,3" filter="url(#soft)"/>

  <!-- Analyzer (center) -->
  <rect x="260" y="140" width="180" height="100" rx="10" fill="#2e1065" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
  <text x="350" y="170" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="13" font-weight="bold">🧠 ANALYZER</text>
  <text x="350" y="190" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">LLM + Rules Engine</text>
  <text x="350" y="205" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">Pattern Memory</text>
  <text x="350" y="220" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">Health Score Engine</text>

  <!-- Arrow to outputs -->
  <line x1="440" y1="170" x2="520" y2="80" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="190" x2="520" y2="170" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="210" x2="520" y2="260" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="220" x2="520" y2="350" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Output boxes -->
  <rect x="520" y="50" width="140" height="50" rx="6" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="590" y="72" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">AGENT INJECT</text>
  <text x="590" y="87" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8">CLAUDE.md • .clinerules</text>

  <rect x="520" y="130" width="140" height="50" rx="6" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="590" y="152" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">HEALTH SCORE</text>
  <text x="590" y="167" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8">A-F grading • SVG badge</text>

  <rect x="520" y="220" width="140" height="50" rx="6" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="590" y="242" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">SMART FIXES</text>
  <text x="590" y="257" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8">Auto-patch suggestions</text>

  <rect x="520" y="310" width="140" height="50" rx="6" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="590" y="332" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">REPORTS</text>
  <text x="590" y="347" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8">HTML • MD • JSON</text>

  <!-- Agent silhouettes bottom -->
  <g transform="translate(30, 260)">
    <rect width="90" height="45" rx="6" fill="#1e1b4b" stroke="#c084fc" stroke-width="1"/>
    <text x="45" y="28" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="10">Claude Code</text>
  </g>
  <g transform="translate(130, 260)">
    <rect width="80" height="45" rx="6" fill="#1e1b4b" stroke="#67e8f9" stroke-width="1"/>
    <text x="40" y="28" text-anchor="middle" fill="#a5f3fc" font-family="monospace" font-size="10">Kilo Code</text>
  </g>
  <g transform="translate(220, 260)">
    <rect width="65" height="45" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1"/>
    <text x="32" y="28" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10">Cline</text>
  </g>
  <g transform="translate(295, 260)">
    <rect width="80" height="45" rx="6" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="28" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="10">OpenCode</text>
  </g>
  <g transform="translate(385, 260)">
    <rect width="70" height="45" rx="6" fill="#1e1b4b" stroke="#f472b6" stroke-width="1"/>
    <text x="35" y="28" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="10">Codex</text>
  </g>

  <!-- Arrows from agents to watchers -->
  <path d="M 75,260 Q 75,240 105,180" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <path d="M 170,260 Q 150,240 105,180" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Title -->
  <text x="400" y="410" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">ARCHITECTURE — Shadow Brain watches agents → analyzes code → injects intelligence</text>
  <text x="400" y="432" text-anchor="middle" fill="#334155" font-family="monospace" font-size="9">v1.2.0 • @theihtisham/agent-shadow-brain</text>
</svg>
