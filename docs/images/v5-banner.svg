<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="25%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#22c55e"/>
      <stop offset="75%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Top accent line -->
  <rect y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Central brain icon -->
  <g transform="translate(80, 60)" filter="url(#glow-filter)">
    <!-- Brain shape -->
    <circle cx="60" cy="60" r="55" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="60" r="45" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="60" r="35" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <!-- Neural connections -->
    <circle cx="40" cy="45" r="4" fill="#a855f7" opacity="0.9"/>
    <circle cx="75" cy="40" r="3" fill="#06b6d4" opacity="0.9"/>
    <circle cx="55" cy="70" r="5" fill="#22c55e" opacity="0.9"/>
    <circle cx="85" cy="65" r="3" fill="#f59e0b" opacity="0.9"/>
    <circle cx="35" cy="75" r="3" fill="#ef4444" opacity="0.9"/>
    <line x1="40" y1="45" x2="75" y2="40" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
    <line x1="75" y1="40" x2="55" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <line x1="55" y1="70" x2="85" y2="65" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="45" x2="55" y2="70" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <line x1="35" y1="75" x2="55" y2="70" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="45" x2="35" y2="75" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
    <line x1="75" y1="40" x2="85" y2="65" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <!-- Infinity symbol overlay -->
    <text x="60" y="130" text-anchor="middle" font-family="serif" font-size="30" fill="#a855f7" opacity="0.4">∞</text>
  </g>

  <!-- Title -->
  <text x="240" y="85" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="2">
    AGENT SHADOW BRAIN
  </text>
  <text x="240" y="118" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a855f7" letter-spacing="4" font-weight="bold">
    v5.0.0 — INFINITE INTELLIGENCE EDITION
  </text>

  <!-- Subtitle -->
  <text x="240" y="148" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="1">
    Self-Evolving Infinite-Memory Intelligence Layer for AI Coding Agents
  </text>

  <!-- Feature pills row 1 -->
  <g transform="translate(240, 168)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
    <text x="70" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">∞ Hierarchical Memory</text>

    <rect x="150" y="0" width="150" height="24" rx="12" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="225" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">Context Associative Recall</text>

    <rect x="310" y="0" width="150" height="24" rx="12" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
    <text x="385" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80">Multi-Agent Consensus</text>

    <rect x="470" y="0" width="155" height="24" rx="12" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
    <text x="547" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">Collective Cross-Project</text>
  </g>

  <!-- Feature pills row 2 -->
  <g transform="translate(240, 198)">
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f87171">TurboQuant 6×</text>

    <rect x="130" y="0" width="130" height="24" rx="12" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
    <text x="195" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">SSSP BMSSP Routing</text>

    <rect x="270" y="0" width="130" height="24" rx="12" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="335" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">Self-Evolving Rules</text>

    <rect x="410" y="0" width="120" height="24" rx="12" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
    <text x="470" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80">Cross-Agent CAIP</text>

    <rect x="540" y="0" width="120" height="24" rx="12" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
    <text x="600" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">Swarm ACO Intel</text>
  </g>

  <!-- Feature pills row 3 -->
  <g transform="translate(240, 228)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
    <text x="70" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f87171">Adversarial Defense</text>

    <rect x="150" y="0" width="150" height="24" rx="12" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
    <text x="225" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">Knowledge Graph PageRank</text>

    <rect x="310" y="0" width="140" height="24" rx="12" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
    <text x="380" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">Predictive Bug Engine</text>

    <rect x="460" y="0" width="130" height="24" rx="12" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
    <text x="525" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80">Neural Quantum Mesh</text>
  </g>

  <!-- Right side: Agent logos area -->
  <g transform="translate(880, 60)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#64748b" letter-spacing="2">SUPPORTED AGENTS</text>

    <!-- Agent badges -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="130" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="10" y="15" font-family="monospace" font-size="10" fill="#c084fc">◆ Claude Code</text>

      <rect x="140" y="0" width="100" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="150" y="15" font-family="monospace" font-size="10" fill="#22d3ee">◆ Kilo Code</text>

      <rect x="0" y="28" width="100" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="10" y="43" font-family="monospace" font-size="10" fill="#4ade80">◆ Cline</text>

      <rect x="110" y="28" width="110" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="120" y="43" font-family="monospace" font-size="10" fill="#fbbf24">◆ OpenCode</text>

      <rect x="230" y="28" width="90" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="240" y="43" font-family="monospace" font-size="10" fill="#f87171">◆ Codex</text>

      <rect x="0" y="56" width="100" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="10" y="71" font-family="monospace" font-size="10" fill="#c084fc">◆ Roo Code</text>

      <rect x="110" y="56" width="80" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="120" y="71" font-family="monospace" font-size="10" fill="#22d3ee">◆ Aider</text>
    </g>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(0, 310)">
    <rect y="0" width="1200" height="90" fill="#0a0a1a" opacity="0.8"/>
    <rect y="0" width="1200" height="1" fill="url(#accent)" opacity="0.3"/>

    <!-- Stat boxes -->
    <g transform="translate(50, 15)">
      <text x="0" y="0" font-family="monospace" font-size="28" font-weight="bold" fill="#a855f7">12</text>
      <text x="0" y="18" font-family="monospace" font-size="10" fill="#64748b">BRAIN MODULES</text>
    </g>

    <g transform="translate(200, 15)">
      <text x="0" y="0" font-family="monospace" font-size="28" font-weight="bold" fill="#06b6d4">45+</text>
      <text x="0" y="18" font-family="monospace" font-size="10" fill="#64748b">CLI COMMANDS</text>
    </g>

    <g transform="translate(350, 15)">
      <text x="0" y="0" font-family="monospace" font-size="28" font-weight="bold" fill="#22c55e">7</text>
      <text x="0" y="18" font-family="monospace" font-size="10" fill="#64748b">AI AGENTS</text>
    </g>

    <g transform="translate(470, 15)">
      <text x="0" y="0" font-family="monospace" font-size="28" font-weight="bold" fill="#f59e0b">6×</text>
      <text x="0" y="18" font-family="monospace" font-size="10" fill="#64748b">COMPRESSION</text>
    </g>

    <g transform="translate(590, 15)">
      <text x="0" y="0" font-family="monospace" font-size="28" font-weight="bold" fill="#ef4444">∞</text>
      <text x="0" y="18" font-family="monospace" font-size="10" fill="#64748b">RETENTION</text>
    </g>

    <!-- Research badges -->
    <g transform="translate(740, 15)">
      <rect x="0" y="0" width="200" height="28" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
      <text x="10" y="18" font-family="monospace" font-size="10" fill="#c084fc">📄 TurboQuant — ICLR 2026</text>

      <rect x="0" y="34" width="200" height="28" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
      <text x="10" y="52" font-family="monospace" font-size="10" fill="#22d3ee">📄 BMSSP SSSP — arXiv 2025</text>
    </g>

    <!-- Install command -->
    <g transform="translate(970, 15)">
      <rect x="0" y="0" width="210" height="28" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="10" y="18" font-family="monospace" font-size="10" fill="#22c55e">$ npm i -g agent-shadow-brain</text>

      <text x="0" y="50" font-family="monospace" font-size="10" fill="#64748b">Zero Forgetting · Self-Evolving · Multi-Agent</text>
    </g>
  </g>
</svg>
